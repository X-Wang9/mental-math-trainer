<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mental Math 双语训练器</title>
  <style>
    :root {
      --bg: #edf7fb;
      --surface: rgba(255, 255, 255, .86);
      --ink: #152033;
      --muted: #5d728b;
      --line: #c9d9e8;
      --blue: #2563eb;
      --cyan: #06b6d4;
      --shadow: 0 18px 44px rgba(21, 32, 51, .10);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 0%, rgba(34, 211, 238, .20), transparent 30%),
        radial-gradient(circle at 88% 6%, rgba(96, 165, 250, .18), transparent 32%),
        linear-gradient(135deg, rgba(37, 99, 235, .09), transparent 34%),
        linear-gradient(315deg, rgba(16, 185, 129, .10), transparent 32%),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .34;
      background-image:
        linear-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, .035) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, .8), transparent 72%);
    }

    .shell {
      position: relative;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      padding: 14px;
      gap: 12px;
    }

    .switchbar {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 12px 14px;
      border: 1px solid color-mix(in srgb, var(--line) 72%, transparent);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .08), transparent 52%),
        var(--surface);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .identity {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .identity strong {
      overflow: hidden;
      font-size: 18px;
      line-height: 1.15;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .identity span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .language-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(84px, 1fr));
      gap: 4px;
      flex: 0 0 auto;
      padding: 4px;
      border: 1px solid color-mix(in srgb, var(--line) 78%, transparent);
      border-radius: 10px;
      background: color-mix(in srgb, #fff 78%, transparent);
    }

    .language-tab {
      min-height: 36px;
      padding: 0 14px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      transition: color .18s ease, background .18s ease, box-shadow .18s ease;
    }

    .language-tab[aria-pressed="true"] {
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      box-shadow: 0 8px 18px rgba(37, 99, 235, .22);
    }

    .frame-wrap {
      position: relative;
      width: min(1216px, 100%);
      min-height: 0;
      margin: 0 auto;
      border: 1px solid color-mix(in srgb, var(--line) 70%, transparent);
      border-radius: 16px;
      overflow: hidden;
      background: #07131f;
      box-shadow: var(--shadow);
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 112px);
      min-height: 640px;
      border: 0;
      background: #07131f;
    }

    @media (max-width: 680px) {
      .shell {
        padding: 10px;
      }

      .switchbar {
        align-items: stretch;
        flex-direction: column;
      }

      .identity strong,
      .identity span {
        white-space: normal;
      }

      .language-tabs {
        width: 100%;
      }

      iframe {
        height: calc(100vh - 154px);
        min-height: 560px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="switchbar" aria-label="Language switcher">
      <div class="identity">
        <strong id="shellTitle">Mental Math 双语训练器</strong>
        <span id="shellSub">在同一个页面切换中文和 English 训练界面</span>
      </div>
      <div class="language-tabs" role="group" aria-label="Choose language">
        <button class="language-tab" type="button" data-lang="zh" aria-pressed="true">中文</button>
        <button class="language-tab" type="button" data-lang="en" aria-pressed="false">English</button>
      </div>
    </header>

    <main class="frame-wrap" aria-label="Mental math trainer">
      <iframe id="trainerFrame" title="Mental Math Trainer" src="Mental MathV2.0.html"></iframe>
    </main>
  </div>

  <script>
    const copy = {
      zh: {
        htmlLang: 'zh-CN',
        title: 'Mental Math 双语训练器',
        subtitle: '在同一个页面切换中文和 English 训练界面',
        frameTitle: 'Mental Math 中文训练器',
        src: 'Mental MathV2.0.html'
      },
      en: {
        htmlLang: 'en',
        title: 'Mental Math Bilingual Trainer',
        subtitle: 'Switch between Chinese and English practice in one page',
        frameTitle: 'Mental Math English Trainer',
        src: 'Mental MathV2.0-en.html'
      }
    };

    const frame = document.getElementById('trainerFrame');
    const shellTitle = document.getElementById('shellTitle');
    const shellSub = document.getElementById('shellSub');
    const buttons = Array.from(document.querySelectorAll('[data-lang]'));

    function readInitialLanguage() {
      const hashLang = location.hash.replace('#', '');
      const savedLang = localStorage.getItem('mentalMathLanguage');
      return copy[hashLang] ? hashLang : (copy[savedLang] ? savedLang : 'zh');
    }

    function setLanguage(lang, shouldPushHash = true) {
      const next = copy[lang] ? lang : 'zh';
      const selected = copy[next];

      document.documentElement.lang = selected.htmlLang;
      document.title = selected.title;
      shellTitle.textContent = selected.title;
      shellSub.textContent = selected.subtitle;
      frame.title = selected.frameTitle;
      frame.src = selected.src;
      localStorage.setItem('mentalMathLanguage', next);

      buttons.forEach((button) => {
        button.setAttribute('aria-pressed', String(button.dataset.lang === next));
      });

      if (shouldPushHash && location.hash !== `#${next}`) {
        history.replaceState(null, '', `#${next}`);
      }
    }

    buttons.forEach((button) => {
      button.addEventListener('click', () => setLanguage(button.dataset.lang));
    });

    window.addEventListener('hashchange', () => {
      const lang = location.hash.replace('#', '');
      if (copy[lang]) setLanguage(lang, false);
    });

    setLanguage(readInitialLanguage(), false);
  </script>
</body>
</html>
